<script>
 document.getElementById("close-popup").addEventListener("click", () => {
    popup.style.display = "none";
    panzoom.reset();
}); 
const popup = document.getElementById("popup");
const popupImg = document.getElementById("popup-img");

const panzoom = Panzoom(popupImg,{
    maxScale:5,
    minScale:1,
    disablePan:true
});

popupImg.addEventListener('panzoomzoom', () => {
    const scale = panzoom.getScale();

    if(scale <= 1.05){
        panzoom.reset();
        panzoom.setOptions({ disablePan:true });
    }else{
        panzoom.setOptions({ disablePan:false });
    }
});

popupImg.parentElement.addEventListener('wheel', panzoom.zoomWithWheel);

document.querySelectorAll(".gallery img").forEach(img=>{
    img.onclick=()=>{
        popup.style.display="flex";
        popupImg.src=img.src;

        panzoom.reset();

        history.pushState({popup:true},"");
    }
});

window.addEventListener("popstate",()=>{
    if(popup.style.display==="flex"){
        popup.style.display="none";
    }
});

</script>
